name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows
        run: wails build -platform windows/amd64 -o animobox.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/animobox.exe

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: animobox-windows
          path: build/bin/animobox.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev gcc

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux
        run: wails build -platform linux/amd64 -o animobox

      - name: Create deb package
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          VERSION="${VERSION#v}"
          PKG="animobox_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"

          cat > "${PKG}/DEBIAN/control" << EOF
          Package: animobox
          Version: ${VERSION}
          Section: multimedia
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.0-0, vlc
          Maintainer: keiz7en
          Description: AnimoBox - Desktop Anime Streaming App
          A desktop anime streaming application with VLC player support.
          EOF
          sed -i 's/^          //' "${PKG}/DEBIAN/control"

          cp build/bin/animobox "${PKG}/usr/bin/animobox"
          chmod +x "${PKG}/usr/bin/animobox"

          cat > "${PKG}/usr/share/applications/animobox.desktop" << EOF
          [Desktop Entry]
          Name=AnimoBox
          Exec=/usr/bin/animobox
          Icon=animobox
          Type=Application
          Categories=AudioVideo;Video;
          EOF
          sed -i 's/^          //' "${PKG}/usr/share/applications/animobox.desktop"

          dpkg-deb --build "${PKG}"
          echo "DEB_FILE=${PKG}.deb" >> $GITHUB_ENV

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DEB_FILE }}

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: animobox-linux
          path: ${{ env.DEB_FILE }}
